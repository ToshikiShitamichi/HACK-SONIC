<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>クイズ開始</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 30px 25px;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: #333;
        }

        h3 {
            margin-top: 20px;
            margin-bottom: 10px;
            color: #555;
            font-size: 1.1rem;
        }

        select {
            width: 100%;
            padding: 10px 12px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: all 0.2s ease;
        }

        select:focus {
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
        }

        .checkbox-group label {
            display: block;
            padding: 8px 0;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .checkbox-group input[type="checkbox"] {
            margin-right: 8px;
            accent-color: #007bff;
            transform: scale(1.1);
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px 0;
            margin-top: 25px;
            font-size: 1rem;
            font-weight: 500;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>クイズ条件を選択</h2>

        <form action="quiz.html" method="GET">
            <!-- 地域 -->
            <h3>地域</h3>
            <select name="region_id">
                <option value="">指定なし</option>
                <option value="1">北海道</option>
                <option value="2">東北</option>
                <option value="3">関東</option>
                <option value="4">中部</option>
                <option value="5">関西</option>
                <option value="6">中国</option>
                <option value="7">四国</option>
                <option value="8">九州</option>
                <option value="9">沖縄</option>
            </select>

            <!-- 都道府県 -->
            <h3>都道府県</h3>
            <select name="prefecture_id">
                <option value="">指定なし</option>
                <option value="1">北海道</option>
                <option value="2">青森県</option>
                <option value="3">岩手県</option>
                <option value="4">宮城県</option>
                <option value="5">秋田県</option>
                <option value="6">山形県</option>
                <option value="7">福島県</option>
                <option value="8">茨城県</option>
                <option value="9">栃木県</option>
                <option value="10">群馬県</option>
                <option value="11">埼玉県</option>
                <option value="12">千葉県</option>
                <option value="13">東京都</option>
                <option value="14">神奈川県</option>
                <option value="15">新潟県</option>
                <option value="16">富山県</option>
                <option value="17">石川県</option>
                <option value="18">福井県</option>
                <option value="19">山梨県</option>
                <option value="20">長野県</option>
                <option value="21">岐阜県</option>
                <option value="22">静岡県</option>
                <option value="23">愛知県</option>
                <option value="24">三重県</option>
                <option value="25">滋賀県</option>
                <option value="26">京都府</option>
                <option value="27">大阪府</option>
                <option value="28">兵庫県</option>
                <option value="29">奈良県</option>
                <option value="30">和歌山県</option>
                <option value="31">鳥取県</option>
                <option value="32">島根県</option>
                <option value="33">岡山県</option>
                <option value="34">広島県</option>
                <option value="35">山口県</option>
                <option value="36">徳島県</option>
                <option value="37">香川県</option>
                <option value="38">愛媛県</option>
                <option value="39">高知県</option>
                <option value="40">福岡県</option>
                <option value="41">佐賀県</option>
                <option value="42">長崎県</option>
                <option value="43">熊本県</option>
                <option value="44">大分県</option>
                <option value="45">宮崎県</option>
                <option value="46">鹿児島県</option>
                <option value="47">沖縄県</option>
            </select>

            <!-- 出題ジャンル -->
            <h3>出題ジャンル</h3>
            <div class="checkbox-group">
                <label><input type="checkbox" name="genre" value="2"> 名産品</label>
                <label><input type="checkbox" name="genre" value="1"> グルメ</label>
                <label><input type="checkbox" name="genre" value="3"> 観光地</label>
                <label><input type="checkbox" name="genre" value="4"> 温泉</label>
                <label><input type="checkbox" name="genre" value="5"> 歴史</label>
                <label><input type="checkbox" name="genre" value="6"> 祭り</label>
                <label><input type="checkbox" name="genre" value="7"> 自然</label>
                <label><input type="checkbox" name="genre" value="8"> 文化</label>
            </div>

            <button type="submit">クイズ開始</button>
        </form>
    </div>
</body>

</html>
