<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>クイズ</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
            padding: 20px;
        }

        #status {
            text-align: right;
            font-weight: 500;
            color: #555;
            margin-bottom: 10px;
        }

        #question {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .choice {
            display: block;
            width: 100%;
            background: #ffffff;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 12px;
            margin: 10px 0;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .choice:hover {
            background-color: #f0f8ff;
            border-color: #007bff;
        }

        .choice.correct {
            color: #28a745;
            font-weight: bold;
            border-color: #28a745;
            background-color: #e6f8ee;
        }

        .choice.incorrect {
            color: #dc3545;
            font-weight: bold;
            border-color: #dc3545;
            background-color: #fde6e6;
        }

        #result {
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: 500;
        }

        #explanation {
            margin-top: 15px;
            padding: 15px;
            background-color: #fff3cd;
            border-left: 5px solid #ffeeba;
            border-radius: 8px;
            display: none;
        }

        #action-buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        #action-buttons button,
        .button-group button {
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #action-buttons button:hover,
        .button-group button:hover {
            background-color: #0056b3;
        }

        .toggle-header {
            cursor: pointer;
            user-select: none;
            margin-top: 20px;
            font-weight: 500;
            color: #007bff;
            transition: all 0.2s ease;
        }

        .toggle-header:hover {
            text-decoration: underline;
        }

        .toggle-content {
            display: none;
            margin-left: 10px;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 2px solid #ddd;
        }

        .result-item,
        .favorite-item {
            margin: 5px 0;
            font-size: 0.95rem;
        }

        .button-group {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .result-item {
            background: #ffffff;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .result-number {
            font-weight: bold;
            color: #888;
            min-width: 22px;
        }

        .result-question {
            flex: 1;
            line-height: 1.5;
        }

        .result-badge {
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .badge-correct {
            background: #e6f8ee;
            color: #28a745;
        }

        .badge-incorrect {
            background: #fde6e6;
            color: #dc3545;
        }

        .favorite-item {
            background: #fff;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 8px;
            border-left: 4px solid #ffc107;
            line-height: 1.5;
        }

        #tag-images {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }

        .tag-image {
            width: 360px;
        }

        .tag-image img {
            width: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .tag-image div {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 4px;
        }
    </style>

    <script>
        let currentQuiz;
        let questionCount = 0;
        let score = 0;
        const totalQuestions = 10;

        let usedQuizIds = [];
        let quizResults = [];
        let favorites = [];

        $(function () {
            loadQuiz();
        });

        function loadQuiz() {
            $("#explanation").hide().text("");
            $("#action-buttons").hide();
            $("#result").text("");
            $("#tag-images").hide().html("");

            if (questionCount >= totalQuestions) {
                showResult();
                return;
            }

            const params = new URLSearchParams(window.location.search);
            const region_id = params.get("region_id");
            const prefecture_id = params.get("prefecture_id");
            const genres = params.getAll("genre");

            $.ajax({
                url: "api/quiz.php",
                method: "GET",
                data: {
                    region_id: region_id || "",
                    prefecture_id: prefecture_id || "",
                    genre: genres,
                    exclude: usedQuizIds
                },
                success: function (data) {

                    console.log("API DATA", data);

                    if (!data.success) {
                        showResult();
                        return;
                    }

                    const quiz = data.quiz;

                    console.log("QUIZ", quiz);

                    currentQuiz = quiz;
                    usedQuizIds.push(quiz.id);

                    displayQuiz(quiz);
                },
                error: function (xhr, status, error) {
                    console.error("Ajax Error:", status, error, xhr.responseText);
                    showResult();
                }
            });
        }

        function displayQuiz(quiz) {
            questionCount++;
            $("#status").text(`問題 ${questionCount} / ${totalQuestions}`);
            $("#question").text(quiz.question);

            let html = "";
            quiz.choices.forEach((choice, i) => {
                html += `<button class="choice" data-index="${i}">${choice.choice_text}</button>`;
            });
            $("#choices").html(html);
        }

        $(document).on("click", ".choice", function () {
            if ($(this).prop("disabled")) return;

            const index = $(this).data("index");
            const choice = currentQuiz.choices[index];
            let correct = false;

            if (choice.is_correct) {
                score++;
                $("#result").text("○ 正解！");
                correct = true;
                $(this).addClass("correct");
            } else {
                $("#result").text("× 不正解");
                $(this).addClass("incorrect");
                $(".choice").each(function () {
                    const i = $(this).data("index");
                    if (currentQuiz.choices[i].is_correct) {
                        $(this).addClass("correct");
                    }
                });
            }

            quizResults.push({
                question: currentQuiz.question,
                correct: correct
            });

            $(".choice").prop("disabled", true);
            $("#action-buttons").show();

            loadTagImages(currentQuiz.id);
        });

        function showExplanation() {
            $("#explanation").text(currentQuiz.explanation).slideDown();
        }

        function saveFavorite() {
            if (favorites.includes(currentQuiz.question)) {
                showModal("既に保存済みです");
                return;
            }

            $.ajax({
                url: "api/save_favorite.php",
                method: "POST",
                data: {
                    quiz_id: currentQuiz.id
                },
                success: function (response) {
                    if (response.success) {
                        favorites.push(currentQuiz.question);
                        showModal(response.message || "問題を保存しました！");

                        // 結果画面の「お気に入り一覧」に即反映
                        const favList = $("#favorite-list");
                        if (favList.length) {
                            if (favList.find(".favorite-item").length === 1 && favList.find(".favorite-item").text() === "保存した問題はありません") {
                                favList.html('');
                            }
                            favList.append(`<div class="favorite-item">${currentQuiz.question}</div>`);
                        }
                    } else {
                        showModal("保存に失敗しました: " + (response.error || "不明なエラー"));
                    }
                },
                error: function (xhr, status, error) {
                    console.error("Ajax Error:", status, error);
                    showModal("保存に失敗しました。ネットワークやサーバーを確認してください");
                }
            });
        }

        function nextQuestion() {
            loadQuiz();
        }

        function showResult() {
            $("#status").text("");
            $("#question").text("クイズ終了");
            $("#choices").html("");
            $("#action-buttons").hide();
            $("#explanation").hide();

            $("#result").html(`<h3>${questionCount}問中 ${score}問正解！</h3>`);

            let resultsHtml = `<h4 class="toggle-header" onclick="toggleSection('result-list')">回答結果一覧 ▼</h4>
            <div id="result-list" class="toggle-content">`;
            quizResults.forEach((res, idx) => {
                resultsHtml += `
                    <div class="result-item">
                        <div class="result-number">${idx + 1}</div>
                        <div class="result-question">${res.question}</div>
                        <div class="result-badge ${res.correct ? 'badge-correct' : 'badge-incorrect'}">
                            ${res.correct ? '正解' : '不正解'}
                        </div>
                    </div>`;
            });
            resultsHtml += `</div>`;

            let favoritesHtml = `<h4 class="toggle-header" onclick="toggleSection('favorite-list')">気になるに追加したもの一覧 ▼</h4>
            <div id="favorite-list" class="toggle-content">`;
            if (favorites.length === 0) {
                favoritesHtml += `<div class="favorite-item">保存した問題はありません</div>`;
            } else {
                favorites.forEach((item, idx) => {
                    favoritesHtml += `<div class="favorite-item">${item}</div>`;
                });
            }
            favoritesHtml += `</div>`;

            let navHtml = `<div class="button-group">
                <button onclick="location.href='quiz-top.html'">クイズのトップに戻る</button>
                <button onclick="location.href='quiz-start.html'">出題設定に戻る</button>
                <button onclick="location.href='/HACK-SONIC/index.php'">アプリトップに戻る</button>
            </div>`;

            $("#result").append(resultsHtml + favoritesHtml + navHtml);
            $(".toggle-content").hide();
        }

        function toggleSection(id) {
            $(`#${id}`).slideToggle();
        }

        // モーダルを開く
        function showModal(message) {
            $("#modal-message").text(message);
            $("#modal-overlay").fadeIn(200);
        }

        // モーダルを閉じる
        function closeModal() {
            $("#modal-overlay").fadeOut(200);
        }

        function loadTagImages(quizId) {

            console.log("loadTagImages start", quizId);

            $("#tag-images").html("").hide();

            $.getJSON("api/get_quiz_tags.php?quiz_id=" + quizId, function (data) {

                console.log("tags response", data);

                if (!data.tags || data.tags.length === 0) {
                    console.log("tags empty");
                    return;
                }

                data.tags.forEach(function (tag) {

                    console.log("tag", tag);

                    $.getJSON(
                        "api/get_place_image.php?name=" + encodeURIComponent(tag)
                    )
                        .done(function (img) {

                            console.log("img", img);

                            if (img.image) {

                                $("#tag-images").append(`
                                    <div class="tag-image">
                                        <img src="${img.image}">
                                        <div style="font-size:0.8rem;text-align:center">${tag}</div>
                                    </div>
                                `);

                                $("#tag-images").show();

                            }

                        })
                        .fail(function (xhr, status, error) {

                            console.log("image api error");
                            console.log("status:", status);
                            console.log("error:", error);
                            console.log("response:", xhr.responseText);

                        });

                });

            });

        }
    </script>
</head>

<body>
    <div class="container">
        <h3 id="status"></h3>
        <h2 id="question"></h2>
        <div id="choices"></div>
        <h3 id="result"></h3>

        <div id="explanation"></div>
        <div id="tag-images" style="margin-top:15px;display:none;"></div>

        <div id="action-buttons">
            <button onclick="showExplanation()">解説を見る</button>
            <button onclick="saveFavorite()">保存する</button>
            <button onclick="nextQuestion()">次の問題へ</button>
        </div>
    </div>
    <div id="modal-overlay"
        style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:999;">
        <div id="modal-box"
            style="background:#fff;padding:20px;border-radius:10px;max-width:400px;margin:20% auto;text-align:center;position:relative;">
            <span id="modal-message" style="display:block;margin-bottom:15px;font-size:1rem;"></span>
            <button onclick="closeModal()"
                style="padding:8px 16px;border:none;border-radius:6px;background:#007bff;color:#fff;cursor:pointer;">閉じる</button>
        </div>
    </div>
</body>

</html>
